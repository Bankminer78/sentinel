<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Sentinel</title>
  <style>
    body {
      margin: 0;
      padding: 16px;
      width: 320px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0f0f14;
      color: #f4f4f5;
      font-size: 13px;
    }
    h1 {
      margin: 0 0 12px 0;
      font-size: 16px;
      color: #f87171;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .status {
      background: #1e1e2e;
      border-radius: 8px;
      padding: 10px 12px;
      margin-bottom: 12px;
    }
    .label {
      color: #a1a1aa;
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 4px;
    }
    .value {
      color: #f4f4f5;
      font-size: 13px;
      word-break: break-all;
    }
    .blocks {
      max-height: 180px;
      overflow-y: auto;
    }
    .block-item {
      padding: 6px 0;
      border-bottom: 1px solid #27272a;
      font-size: 12px;
    }
    .block-item:last-child {
      border-bottom: none;
    }
    .block-domain { color: #f87171; }
    .block-time { color: #71717a; font-size: 10px; }
    .footer {
      margin-top: 12px;
      text-align: center;
    }
    a {
      color: #60a5fa;
      text-decoration: none;
      font-size: 12px;
    }
    a:hover { text-decoration: underline; }
    .err { color: #f87171; font-size: 11px; }
  </style>
</head>
<body>
  <h1>Sentinel</h1>
  <div class="status">
    <div class="label">Current activity</div>
    <div class="value" id="current">(loading)</div>
  </div>
  <div class="status">
    <div class="label">Active rules</div>
    <div class="value" id="rules">-</div>
  </div>
  <div class="status">
    <div class="label">Recent blocks</div>
    <div class="blocks" id="blocks">(none)</div>
  </div>
  <div class="footer">
    <a href="http://localhost:9849" target="_blank">Open Sentinel dashboard</a>
  </div>
  <script src="popup.js"></script>
</body>
</html>
